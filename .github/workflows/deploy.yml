name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

concurrency:
  group: deploy-ec2-principal
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Diagnóstico de arquivos no runner
        run: |
          pwd
          ls -la

      - name: Preparar pacote de deploy
        run: |
          set -e
          BASE_DIR="$(dirname "$(find . -maxdepth 4 -type f -name docker-compose.yml | head -n 1)")"
          if [ -z "$BASE_DIR" ] || [ "$BASE_DIR" = "." ]; then
            echo "Nao foi possivel localizar a raiz do projeto com docker-compose.yml"
            exit 1
          fi

          echo "BASE_DIR detectado: $BASE_DIR"
          test -f "$BASE_DIR/docker-compose.yml"
          test -d "$BASE_DIR/backend"
          test -d "$BASE_DIR/frontend"
          test -d "$BASE_DIR/nginx"

          rm -rf deploy_bundle
          mkdir -p deploy_bundle
          cp -R "$BASE_DIR/docker-compose.yml" deploy_bundle/
          if [ -f "$BASE_DIR/.dockerignore" ]; then cp -R "$BASE_DIR/.dockerignore" deploy_bundle/; fi
          cp -R "$BASE_DIR/backend" deploy_bundle/
          cp -R "$BASE_DIR/frontend" deploy_bundle/
          cp -R "$BASE_DIR/nginx" deploy_bundle/
          ls -la deploy_bundle

      - name: Copiar somente arquivos necessários para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_bundle/docker-compose.yml,deploy_bundle/.dockerignore,deploy_bundle/backend,deploy_bundle/frontend,deploy_bundle/nginx"
          target: /home/ubuntu/app/gestao-obras-vetor
          strip_components: 1
          overwrite: true
          rm: false

      - name: Conectar ao servidor e fazer deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/home/ubuntu/app/gestao-obras-vetor"

            sudo mkdir -p "$APP_DIR"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app
            cd "$APP_DIR"

            echo '${{ secrets.BACKEND_ENV }}' > backend/.env

            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build

# Deploy com chaves configuradas
