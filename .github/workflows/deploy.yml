name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

concurrency:
  group: deploy-ec2-principal
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Diagnóstico de arquivos no runner
        run: |
          pwd
          ls -la
          test -f docker-compose.yml && echo "OK docker-compose.yml" || echo "FALTA docker-compose.yml"
          test -d backend && echo "OK backend/" || echo "FALTA backend/"
          test -d frontend && echo "OK frontend/" || echo "FALTA frontend/"
          test -d nginx && echo "OK nginx/" || echo "FALTA nginx/"

      - name: Copiar somente arquivos necessários para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,.dockerignore,backend,frontend,nginx"
          target: /home/ubuntu/app/gestao-obras-vetor
          strip_components: 0
          overwrite: true
          rm: false

      - name: Conectar ao servidor e fazer deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/home/ubuntu/app/gestao-obras-vetor"

            sudo mkdir -p "$APP_DIR"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app
            cd "$APP_DIR"

            echo '${{ secrets.BACKEND_ENV }}' > backend/.env

            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build

# Deploy com chaves configuradas
