name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

concurrency:
  group: deploy-ec2-principal
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Diagnóstico de arquivos no runner
        run: |
          pwd
          ls -la

      - name: Detectar raiz do projeto
        run: |
          set -e
          BASE_DIR="$(dirname "$(find . -maxdepth 4 -type f -name docker-compose.yml | head -n 1)")"
          if [ -z "$BASE_DIR" ] || [ "$BASE_DIR" = "." ]; then
            echo "Nao foi possivel localizar a raiz do projeto com docker-compose.yml"
            exit 1
          fi

          echo "BASE_DIR detectado: $BASE_DIR"
          test -f "$BASE_DIR/docker-compose.yml"
          test -d "$BASE_DIR/backend"
          test -d "$BASE_DIR/frontend"
          test -d "$BASE_DIR/nginx"
          echo "BASE_DIR=$BASE_DIR" >> "$GITHUB_ENV"

      - name: Configurar credenciais AWS (modo SSM)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EC2_INSTANCE_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM (sem SSH)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EC2_INSTANCE_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          BACKEND_ENV_B64="$(printf '%s' "${{ secrets.BACKEND_ENV }}" | base64 | tr -d '\n' | tr -d '\r')"

          cat > /tmp/ssm-params.json <<JSON
          {
            "commands": [
              "set -e",
              "APP_DIR=/home/ubuntu/app/gestao-obras-vetor",
              "DATA_DIR=/home/ubuntu/app_data/gestao-obras-vetor",
              "sudo mkdir -p $APP_DIR",
              "sudo mkdir -p $DATA_DIR/database $DATA_DIR/uploads",
              "sudo chown -R ubuntu:ubuntu /home/ubuntu/app /home/ubuntu/app_data",
              "cd $APP_DIR",
              "if [ ! -d .git ]; then git clone -b principal https://github.com/${{ github.repository }}.git .; fi",
              "git fetch origin principal",
              "git reset --hard origin/principal",
              "echo '$BACKEND_ENV_B64' | base64 -d > backend/.env",
              "printf 'APP_DATA_DIR=%s\\n' '$DATA_DIR' > .env",
              "sudo docker compose up -d --build",
              "sleep 5",
              "curl -sf http://localhost/api/health && echo OK || (echo FALHOU; exit 1)"
            ]
          }
          JSON

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy gestao-obras-vetor via GitHub Actions" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' \
            --output text)"

          echo ">>> SSM CommandId: $COMMAND_ID"

          for i in $(seq 1 120); do
            STATUS="$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query 'CommandInvocations[0].Status' \
              --output text)"
            echo ">>> Status SSM: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
              exit 0
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelling" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true
              exit 1
            fi
            sleep 5
          done

          echo "Timeout aguardando comando SSM concluir."
          exit 1

      - name: Configurar SSH para rsync
        if: ${{ secrets.EC2_INSTANCE_ID == '' }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.EC2_SSH_KEY }}' > ~/.ssh/id_ec2
          chmod 600 ~/.ssh/id_ec2
          ssh-keyscan -T 10 -H '${{ secrets.EC2_HOST }}' >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Testar conectividade SSH com EC2
        if: ${{ secrets.EC2_INSTANCE_ID == '' }}
        run: |
          set -e
          SSH_OPTS="-i ~/.ssh/id_ec2 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"

          ok=0
          for i in 1 2 3 4 5; do
            echo "Tentativa de SSH $i/5..."
            if ssh $SSH_OPTS ubuntu@${{ secrets.EC2_HOST }} "echo conectado" >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 8
          done

          if [ "$ok" -ne 1 ]; then
            echo "Falha de conectividade SSH: porta 22 inacessivel a partir do runner do GitHub."
            echo "Verifique Security Group, NACL, IP publico da EC2 e se o sshd esta ativo."
            exit 1
          fi

      - name: Sincronizar arquivos para EC2 (rápido)
        if: ${{ secrets.EC2_INSTANCE_ID == '' }}
        run: |
          set -e
          APP_DIR="/home/ubuntu/app/gestao-obras-vetor"
          SSH_OPTS="-i ~/.ssh/id_ec2 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15"

          retry() {
            local n=1
            local max=5
            local delay=8
            while true; do
              "$@" && break || {
                if [ $n -lt $max ]; then
                  n=$((n+1))
                  echo "Falhou. Nova tentativa em ${delay}s (${n}/${max})..."
                  sleep $delay
                else
                  echo "Comando falhou apos ${max} tentativas: $*"
                  return 1
                fi
              }
            done
          }

          retry ssh $SSH_OPTS ubuntu@${{ secrets.EC2_HOST }} "mkdir -p '$APP_DIR/backend' '$APP_DIR/frontend' '$APP_DIR/nginx'"

          retry rsync -az -e "ssh $SSH_OPTS" "$BASE_DIR/docker-compose.yml" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/"

          if [ -f "$BASE_DIR/.dockerignore" ]; then
            retry rsync -az -e "ssh $SSH_OPTS" "$BASE_DIR/.dockerignore" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/"
          fi

          retry rsync -az -e "ssh $SSH_OPTS" \
            --exclude node_modules \
            --exclude database \
            --exclude uploads \
            --exclude logs \
            --exclude "*.log" \
            --exclude .env \
            "$BASE_DIR/backend/" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/backend/"

          retry rsync -az -e "ssh $SSH_OPTS" \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude .vite \
            "$BASE_DIR/frontend/" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/frontend/"

          retry rsync -az -e "ssh $SSH_OPTS" "$BASE_DIR/nginx/" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/nginx/"

      - name: Conectar ao servidor e fazer deploy
        if: ${{ secrets.EC2_INSTANCE_ID == '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/home/ubuntu/app/gestao-obras-vetor"
            DATA_DIR="/home/ubuntu/app_data/gestao-obras-vetor"
            LEGACY_DIR_1="/home/ubuntu/app/gestao-obras-vetor/backend"
            LEGACY_DIR_2="/home/ubuntu/app/gestao-obras-vetor/gestao-obras-vetor/backend"

            sudo mkdir -p "$APP_DIR"
            sudo mkdir -p "$DATA_DIR/database" "$DATA_DIR/uploads"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app_data
            cd "$APP_DIR"

            echo '${{ secrets.BACKEND_ENV }}' > backend/.env
            printf 'APP_DATA_DIR=%s\n' "$DATA_DIR" > .env

            if [ ! -f "$DATA_DIR/database/gestao_obras.db" ]; then
              if [ -f "$LEGACY_DIR_1/database/gestao_obras.db" ]; then
                cp -R "$LEGACY_DIR_1/database/." "$DATA_DIR/database/"
              elif [ -f "$LEGACY_DIR_2/database/gestao_obras.db" ]; then
                cp -R "$LEGACY_DIR_2/database/." "$DATA_DIR/database/"
              fi
            fi

            if [ -d "$LEGACY_DIR_1/uploads" ] && [ -z "$(ls -A "$DATA_DIR/uploads" 2>/dev/null)" ]; then
              cp -R "$LEGACY_DIR_1/uploads/." "$DATA_DIR/uploads/" || true
            elif [ -d "$LEGACY_DIR_2/uploads" ] && [ -z "$(ls -A "$DATA_DIR/uploads" 2>/dev/null)" ]; then
              cp -R "$LEGACY_DIR_2/uploads/." "$DATA_DIR/uploads/" || true
            fi

            sudo docker compose up -d --build

# Deploy com chaves configuradas
