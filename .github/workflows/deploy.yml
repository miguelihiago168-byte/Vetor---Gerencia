name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Copiar arquivos para a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"
          target: /home/ubuntu/

      - name: Conectar ao servidor e fazer deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /home/ubuntu/app/gestao-obras-vetor && sudo chown -R ubuntu:ubuntu /home/ubuntu/app/
            rsync -avz /home/ubuntu/ /home/ubuntu/app/gestao-obras-vetor/ --exclude app

            # Instalar Docker Compose V2 binário direto do GitHub (sem depender de apt)
            if ! docker compose version > /dev/null 2>&1; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            echo '${{ secrets.BACKEND_ENV }}' > /home/ubuntu/app/gestao-obras-vetor/gestao-obras-vetor/backend/.env
            cd /home/ubuntu/app/gestao-obras-vetor/gestao-obras-vetor
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build

# Deploy com chaves configuradas
