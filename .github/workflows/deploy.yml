name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Conectar ao servidor e fazer deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ubuntu/app/gestao-obras-vetor"

            sudo mkdir -p "$APP_DIR"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repositório não encontrado em $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin principal
            git reset --hard origin/principal

            echo '${{ secrets.BACKEND_ENV }}' > backend/.env

            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build

# Deploy com chaves configuradas
