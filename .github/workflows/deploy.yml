name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

concurrency:
  group: deploy-ec2-principal
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Diagnóstico de arquivos no runner
        run: |
          pwd
          ls -la

      - name: Detectar raiz do projeto
        run: |
          set -e
          BASE_DIR="$(dirname "$(find . -maxdepth 4 -type f -name docker-compose.yml | head -n 1)")"
          if [ -z "$BASE_DIR" ] || [ "$BASE_DIR" = "." ]; then
            echo "Nao foi possivel localizar a raiz do projeto com docker-compose.yml"
            exit 1
          fi

          echo "BASE_DIR detectado: $BASE_DIR"
          test -f "$BASE_DIR/docker-compose.yml"
          test -d "$BASE_DIR/backend"
          test -d "$BASE_DIR/frontend"
          test -d "$BASE_DIR/nginx"
          echo "BASE_DIR=$BASE_DIR" >> "$GITHUB_ENV"

      - name: Configurar SSH para rsync
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.EC2_SSH_KEY }}' > ~/.ssh/id_ec2
          chmod 600 ~/.ssh/id_ec2
          ssh-keyscan -T 10 -H '${{ secrets.EC2_HOST }}' >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sincronizar arquivos para EC2 (rápido)
        run: |
          set -e
          APP_DIR="/home/ubuntu/app/gestao-obras-vetor"
          SSH_OPTS="-i ~/.ssh/id_ec2 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15"

          ssh $SSH_OPTS ubuntu@${{ secrets.EC2_HOST }} "mkdir -p '$APP_DIR/backend' '$APP_DIR/frontend' '$APP_DIR/nginx'"

          rsync -az -e "ssh $SSH_OPTS" "$BASE_DIR/docker-compose.yml" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/"

          if [ -f "$BASE_DIR/.dockerignore" ]; then
            rsync -az -e "ssh $SSH_OPTS" "$BASE_DIR/.dockerignore" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/"
          fi

          rsync -az -e "ssh $SSH_OPTS" \
            --exclude node_modules \
            --exclude database \
            --exclude uploads \
            --exclude logs \
            --exclude "*.log" \
            --exclude .env \
            "$BASE_DIR/backend/" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/backend/"

          rsync -az -e "ssh $SSH_OPTS" \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude .vite \
            "$BASE_DIR/frontend/" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/frontend/"

          rsync -az -e "ssh $SSH_OPTS" "$BASE_DIR/nginx/" ubuntu@${{ secrets.EC2_HOST }}:"$APP_DIR/nginx/"

      - name: Conectar ao servidor e fazer deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/home/ubuntu/app/gestao-obras-vetor"

            sudo mkdir -p "$APP_DIR"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app
            cd "$APP_DIR"

            echo '${{ secrets.BACKEND_ENV }}' > backend/.env

            sudo docker compose up -d --build

# Deploy com chaves configuradas
