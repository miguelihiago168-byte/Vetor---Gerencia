name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Copiar arquivos para a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"
          target: /home/ubuntu/

      - name: Conectar ao servidor e fazer deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /home/ubuntu/app/gestao-obras-vetor && sudo chown -R ubuntu:ubuntu /home/ubuntu/app/
            rsync -avz /home/ubuntu/ /home/ubuntu/app/gestao-obras-vetor/ --exclude app
            ls -R /home/ubuntu/app/
            if [ -f /home/ubuntu/app/gestao-obras-vetor/gestao-obras-vetor/docker-compose.yml ]; then
              cd /home/ubuntu/app/gestao-obras-vetor/gestao-obras-vetor
            else
              cd /home/ubuntu/app/gestao-obras-vetor
            fi
            sudo docker-compose up -d --build

# Deploy com chaves configuradas
