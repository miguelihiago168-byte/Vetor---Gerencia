name: Deploy para AWS EC2

on:
  push:
    branches:
      - principal

concurrency:
  group: deploy-ec2-principal
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Descobrir IP publico do runner
        id: runner_ip
        shell: bash
        run: |
          set -euo pipefail
          ip="$(curl -fsSL https://checkip.amazonaws.com | tr -d '\n' | tr -d '\r')"
          if [ -z "$ip" ]; then
            echo "Nao foi possivel descobrir o IP publico do runner."
            exit 1
          fi
          echo "ip=$ip" >> "$GITHUB_OUTPUT"
          echo ">>> Runner IP: $ip"

      - name: Configurar credenciais AWS
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EC2_SECURITY_GROUP_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar credenciais AWS (modo SSM)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EC2_INSTANCE_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM (sem SSH)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EC2_INSTANCE_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          BACKEND_ENV_B64="$(printf '%s' "${{ secrets.BACKEND_ENV }}" | base64 | tr -d '\n' | tr -d '\r')"

          cat > /tmp/ssm-params.json <<JSON
          {
            "commands": [
              "set -e",
              "APP_DIR=/home/ubuntu/app/gestao-obras-vetor",
              "cd $APP_DIR",
              "PREV_COMMIT=$(git rev-parse HEAD || true)",
              "git fetch origin principal",
              "NEW_COMMIT=$(git rev-parse origin/principal)",
              "CHANGED_FILES=$(git diff --name-only $PREV_COMMIT $NEW_COMMIT || true)",
              "git reset --hard origin/principal",
              "echo '$BACKEND_ENV_B64' | base64 -d > backend/.env",
              "NEED_BACKEND=0",
              "NEED_FRONTEND=0",
              "echo \"$CHANGED_FILES\" | grep -Eq '^(backend/|docker-compose.yml)' && NEED_BACKEND=1 || true",
              "echo \"$CHANGED_FILES\" | grep -Eq '^(frontend/|nginx/|docker-compose.yml)' && NEED_FRONTEND=1 || true",
              "if [ $NEED_BACKEND -eq 1 ] && [ $NEED_FRONTEND -eq 1 ]; then sudo docker compose up -d --build backend frontend; elif [ $NEED_BACKEND -eq 1 ]; then sudo docker compose up -d --build backend; elif [ $NEED_FRONTEND -eq 1 ]; then sudo docker compose up -d --build frontend; else sudo docker compose up -d backend frontend; fi",
              "sudo docker compose ps",
              "sleep 5",
              "curl -sf http://localhost/api/health && echo OK || (echo FALHOU; exit 1)"
            ]
          }
          JSON

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy gestao-obras-vetor via GitHub Actions" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' \
            --output text)"

          echo ">>> SSM CommandId: $COMMAND_ID"

          for i in $(seq 1 90); do
            STATUS="$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query 'CommandInvocations[0].Status' \
              --output text)"
            echo ">>> Status SSM: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
              exit 0
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelling" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true
              exit 1
            fi
            sleep 5
          done

          echo "Timeout aguardando comando SSM concluir."
          exit 1

      - name: Liberar SSH temporario no Security Group
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EC2_SECURITY_GROUP_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          CIDR="${{ steps.runner_ip.outputs.ip }}/32"
          SG_ID="${{ secrets.EC2_SECURITY_GROUP_ID }}"
          echo ">>> Liberando TCP/22 para $CIDR no SG $SG_ID"
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"$CIDR\",\"Description\":\"github-actions-temporary-ssh\"}]}]" \
            || true

      - name: Preflight de conectividade SSH
        if: ${{ secrets.EC2_INSTANCE_ID == '' }}
        shell: bash
        run: |
          set -euo pipefail

          HOST="${{ secrets.EC2_HOST }}"
          PORT="22"

          if [ -z "$HOST" ]; then
            echo "Secret EC2_HOST vazio ou não definido."
            exit 1
          fi

          echo ">>> Verificando resolução DNS/IP de $HOST"
          getent hosts "$HOST" || true

          echo ">>> Testando porta $PORT com tentativas"
          ok=0
          for i in 1 2 3 4 5; do
            echo "Tentativa de SSH $i/5..."
            if timeout 8 bash -c "</dev/tcp/$HOST/$PORT" 2>/dev/null; then
              echo "Conectividade TCP na porta $PORT OK."
              ok=1
              break
            fi
            sleep 3
          done

          if [ "$ok" -ne 1 ]; then
            echo "Falha de conectividade SSH: porta $PORT inacessivel a partir do runner do GitHub."
            echo "Se os secrets AWS_* e EC2_SECURITY_GROUP_ID nao estiverem configurados, a liberacao automatica do SG nao ocorre."
            echo "Verifique Security Group, NACL, IP publico da EC2 e se o sshd esta ativo."
            exit 1
          fi

      - name: Conectar ao servidor e fazer deploy
        if: ${{ secrets.EC2_INSTANCE_ID == '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          debug: true
          script_stop: true
          script: |
            set -e

            APP_DIR="/home/ubuntu/app/gestao-obras-vetor"

            echo ">>> Atualizando código..."
            cd "$APP_DIR"
            PREV_COMMIT="$(git rev-parse HEAD || true)"
            git fetch origin principal
            NEW_COMMIT="$(git rev-parse origin/principal)"
            CHANGED_FILES="$(git diff --name-only "$PREV_COMMIT" "$NEW_COMMIT" || true)"
            git reset --hard origin/principal

            echo '${{ secrets.BACKEND_ENV }}' > backend/.env

            NEED_BACKEND=0
            NEED_FRONTEND=0

            if echo "$CHANGED_FILES" | grep -Eq '^(backend/|docker-compose.yml)'; then NEED_BACKEND=1; fi
            if echo "$CHANGED_FILES" | grep -Eq '^(frontend/|nginx/|docker-compose.yml)'; then NEED_FRONTEND=1; fi

            echo ">>> Arquivos alterados:"
            echo "$CHANGED_FILES"

            echo ">>> Subindo containers (build seletivo)..."
            if [ "$NEED_BACKEND" -eq 1 ] && [ "$NEED_FRONTEND" -eq 1 ]; then
              sudo docker compose up -d --build backend frontend
            elif [ "$NEED_BACKEND" -eq 1 ]; then
              sudo docker compose up -d --build backend
            elif [ "$NEED_FRONTEND" -eq 1 ]; then
              sudo docker compose up -d --build frontend
            else
              echo ">>> Sem mudanças em backend/frontend. Garantindo serviços ativos sem rebuild."
              sudo docker compose up -d backend frontend
            fi

            echo ">>> Status dos containers:"
            sudo docker compose ps

            echo ">>> Verificando health check..."
            sleep 5
            curl -sf http://localhost/api/health && echo " OK" || echo " FALHOU"

            echo ">>> Deploy concluído!"

      - name: Revogar SSH temporario do Security Group
        if: ${{ always() && secrets.EC2_INSTANCE_ID == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.EC2_SECURITY_GROUP_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          CIDR="${{ steps.runner_ip.outputs.ip }}/32"
          SG_ID="${{ secrets.EC2_SECURITY_GROUP_ID }}"
          echo ">>> Revogando TCP/22 para $CIDR no SG $SG_ID"
          aws ec2 revoke-security-group-ingress \
            --group-id "$SG_ID" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"$CIDR\"}]}]" \
            || true
